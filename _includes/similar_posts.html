

  <div class="container">

      <h4 class="centered-heading">Similar Posts</h4>
    <div class="similar-posts-grid row justify-content-center">

          <!-- Home Post List -->
          {% assign random_posts = site.posts | where: "lang", "en" | sample: 4 %}
          {% for post in random_posts  %}
          {% if post.lang == 'en' %}

          <div class="col-6 col-md-4 col-lg-3 d-flex">
            <div class="card border-0">
              <article class="post-preview">
                <a href="{{ post.url | prepend: site.baseurl | replace: '//', '/' }}">
                  <div class="card-img-wrapper">
                    <img class="card-img-top" src="{{post.background}}" alt="{{post.description}}" loading="lazy">
                  </div>
                  <div class="card-body py-3">
                    <div class="post-title-wrapper">
                      <h6 class="post-title">{{ post.title }}</h6>
                    </div>
                    <div class="post-subtitle-wrapper">
                      <span class="post-subtitle">{{ post.subtitle }}</span>
                    </div>
                  </div>
                </a>
              </article>
            </div>
          </div>


          {% endif %}
          {% endfor %}
        </div>

      </div>
